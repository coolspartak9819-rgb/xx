<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Кошелёк - KidMoney</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Comic+Neue:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4facfe">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body class="font-game text-gray-800 overflow-x-hidden">
    <!-- Анимированный фон -->
    <div class="background-gradient">
        <div class="floating-element coin">💰</div>
        <div class="floating-element star">⭐</div>
        <div class="floating-element cloud">☁️</div>
        <div class="floating-element coin" style="animation-delay: 5s; left: 80%;">💰</div>
        <div class="floating-element star" style="animation-delay: 8s; left: 20%;">⭐</div>
        <div class="floating-element cloud" style="animation-delay: 10s; left: 50%;">☁️</div>
    </div>

    <div class="safe-container min-h-screen">

        <!-- Карта Баланса -->
        <header class="wallet-header">
            <p class="text-lg text-white/80">Твой кошелёк</p>
            <h1 id="wallet-balance" class="balance-amount">0 💰</h1>
            <button id="purchase-btn" class="game-button primary">🛍️ Купить что-нибудь</button>
        </header>

        <!-- История операций -->
        <main class="p-4">
            <h2 class="text-3xl font-bold text-center text-white mb-6 drop-shadow-lg">История операций</h2>
            <div id="transactions-history" class="game-map">
                <p class="text-gray-400 text-center py-8">Загрузка истории...</p>
            </div>
        </main>

    </div>

    <!-- Нижнее меню -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <span class="text-3xl">🗺️</span>
            <span class="text-xs">Карта</span>
        </a>
        <a href="wallet.html" class="nav-item active">
            <span class="text-3xl">💰</span>
            <span class="text-xs mt-1">Кошелёк</span>
        </a>
        <a href="#" class="nav-item">
            <span class="text-3xl">🏆</span>
            <span class="text-xs mt-1">Достижения</span>
        </a>
    </nav>

    <script src="app.js"></script>
</body>
</html>
