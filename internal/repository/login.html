<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Вход - KidMoney</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <!-- PWA & iOS -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FFF9E6">
    <link rel="apple-touch-icon" href="icons/icon-apple.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="KidMoney">

</head>
<body class="bg-background flex items-center justify-center min-h-screen font-sans p-4">

    <div class="bg-white p-6 rounded-xl shadow-lg w-full max-w-sm">
        <div class="text-center mb-6">
            <h1 class="text-4xl font-bold text-primary">💰 KidMoney</h1>
            <p id="form-title" class="text-gray-500 mt-2">Вход в аккаунт</p>
        </div>

        <form id="auth-form" class="space-y-4">
            <div>
                <label for="username" class="sr-only">Имя пользователя</label>
                <input type="text" id="username" name="username" required class="form-input" placeholder="Имя пользователя">
            </div>

            <div>
                <label for="password" class="sr-only">Пароль</label>
                <input type="password" id="password" name="password" required class="form-input" placeholder="Пароль">
            </div>

            <div id="role-selection" class="hidden">
                <label class="block text-sm font-medium text-gray-700 mb-2">Кто вы?</label>
                <div class="flex space-x-4">
                    <button type="button" data-role="child" class="role-btn flex-1">Ребёнок</button>
                    <button type="button" data-role="parent" class="role-btn flex-1">Родитель</button>
                </div>
                <input type="hidden" id="role" name="role">
            </div>

            <div>
                <button type="submit" id="submit-btn" class="btn btn-primary w-full h-[44px]">Войти</button>
            </div>
        </form>
        <p class="text-center text-sm text-gray-500 mt-4">
            <span id="toggle-text">Нет аккаунта?</span>
            <a href="#" id="toggle-link" class="font-medium text-primary hover:underline">Регистрация</a>
        </p>
    </div>

    <script src="app.js"></script>
</body>
</html>
